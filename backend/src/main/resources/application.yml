spring:
  application:
    name: halilov-market
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/halilov}
    username: ${DB_USER:halilov}
    password: ${DB_PASSWORD:halilov_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: Asia/Jerusalem
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-dev-only-change-me-32+chars-min}
    expirationMinutes: 60
  init:
    admin:
      email: ${INIT_ADMIN_EMAIL:admin@halilov.local}
      password: ${INIT_ADMIN_PASSWORD:admin123!}
      fullName: ${INIT_ADMIN_FULL_NAME:Admin}
  payment:
    provider: ${PAYMENT_PROVIDER:mock}
  delivery:
    courierFlatAgorot: ${DELIVERY_COURIER_AGOROT:1990}
    freeAboveAgorot:   ${DELIVERY_FREE_ABOVE_AGOROT:30000}
    pickup:
      address: ${PICKUP_ADDRESS:רחוב הרצל 1, באר שבע}
      hours:   ${PICKUP_HOURS:א'-ה' 09:00-18:00, ו' 09:00-13:00}
      phone:   ${PICKUP_PHONE:}
  media:
    storage: ${MEDIA_STORAGE:local}
    localDir: ${MEDIA_DIR:./media}
    r2:
      endpoint: ${R2_ENDPOINT:}
      accessKeyId: ${R2_ACCESS_KEY_ID:}
      secretAccessKey: ${R2_SECRET_ACCESS_KEY:}
      bucket: ${R2_BUCKET:}
      publicBaseUrl: ${R2_PUBLIC_BASE_URL:}
  email:
    provider: ${EMAIL_PROVIDER:log}
    fromEmail: ${EMAIL_FROM:no-reply@halilov.local}
    fromName: ${EMAIL_FROM_NAME:חלילוב אונליין}
    adminBcc: ${EMAIL_ADMIN_BCC:}
    siteBaseUrl: ${SITE_BASE_URL:}
    brevo:
      apiKey: ${BREVO_API_KEY:}

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
