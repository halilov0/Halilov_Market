# Production stack for Halilov Market — Oracle Cloud Always Free single-VM.
# Run from repo root:
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env up -d --build
#
# Edge nginx terminates HTTP on :80. Put Cloudflare in front for TLS + WAF.

services:
  postgres:
    image: postgres:16-alpine
    container_name: halilov-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-halilov}
      POSTGRES_USER: ${POSTGRES_USER:-halilov}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-halilov} -d ${POSTGRES_DB:-halilov}"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
    image: halilov/backend:latest
    container_name: halilov-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-halilov}
      DB_USER: ${POSTGRES_USER:-halilov}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (32+ chars)}
      INIT_ADMIN_EMAIL: ${INIT_ADMIN_EMAIL:?INIT_ADMIN_EMAIL must be set}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:?INIT_ADMIN_PASSWORD must be set}
      INIT_ADMIN_FULL_NAME: ${INIT_ADMIN_FULL_NAME:-Admin}
      MEDIA_DIR: /app/media
      PORT: "8080"
      SPRING_PROFILES_ACTIVE: prod
    expose:
      - "8080"
    volumes:
      - media:/app/media

  shop:
    build:
      context: ../shop
    image: halilov/shop:latest
    container_name: halilov-shop
    restart: unless-stopped
    expose:
      - "80"

  admin:
    build:
      context: ../admin
    image: halilov/admin:latest
    container_name: halilov-admin
    restart: unless-stopped
    expose:
      - "80"

  edge:
    image: nginx:1.27-alpine
    container_name: halilov-edge
    restart: unless-stopped
    depends_on:
      - backend
      - shop
      - admin
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
  media:
