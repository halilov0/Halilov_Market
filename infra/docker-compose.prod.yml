# Production stack for Halilov Market — Oracle Cloud Always Free single-VM.
# Run from repo root:
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env up -d --build
#
# Edge nginx terminates HTTP on :80. Put Cloudflare in front for TLS + WAF.

services:
  postgres:
    image: postgres:16-alpine
    container_name: halilov-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-halilov}
      POSTGRES_USER: ${POSTGRES_USER:-halilov}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-halilov} -d ${POSTGRES_DB:-halilov}"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
    image: halilov/backend:latest
    container_name: halilov-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-halilov}
      DB_USER: ${POSTGRES_USER:-halilov}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (32+ chars)}
      INIT_ADMIN_EMAIL: ${INIT_ADMIN_EMAIL:?INIT_ADMIN_EMAIL must be set}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:?INIT_ADMIN_PASSWORD must be set}
      INIT_ADMIN_FULL_NAME: ${INIT_ADMIN_FULL_NAME:-Admin}
      MEDIA_STORAGE: ${MEDIA_STORAGE:-local}
      MEDIA_DIR: /app/media
      # Cap JVM heap so the backend coexists with Postgres + nginx on a 1GB VM.
      # SerialGC keeps GC threads minimal on a single-OCPU machine.
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms128m -Xmx320m -XX:+UseSerialGC -XX:MaxMetaspaceSize=160m}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-log}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@halilov.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Halilov Market}
      EMAIL_ADMIN_BCC: ${EMAIL_ADMIN_BCC:-}
      SITE_BASE_URL: ${SITE_BASE_URL:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      PORT: "8080"
      SPRING_PROFILES_ACTIVE: prod
    expose:
      - "8080"
    volumes:
      - media:/app/media

  shop:
    build:
      context: ../shop
    image: halilov/shop:latest
    container_name: halilov-shop
    restart: unless-stopped
    expose:
      - "80"

  admin:
    build:
      context: ../admin
    image: halilov/admin:latest
    container_name: halilov-admin
    restart: unless-stopped
    expose:
      - "80"

  # Optional pg_dump → S3-compatible sidecar. Opt in with:
  #   docker compose -f infra/docker-compose.prod.yml --profile backup up -d --build
  backup:
    profiles: ["backup"]
    build:
      context: ./backup
    image: halilov/backup:latest
    container_name: halilov-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: Asia/Jerusalem
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-halilov}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATABASE: ${POSTGRES_DB:-halilov}
      BACKUP_CRON: ${BACKUP_CRON:-15 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      # Optional vars use empty default so compose parses cleanly when --profile
      # backup is NOT active. backup.sh enforces required values at runtime.
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-halilov/postgres}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-auto}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}

  edge:
    image: nginx:1.27-alpine
    container_name: halilov-edge
    restart: unless-stopped
    # Wait for backend to actually accept connections before exposing :80,
    # otherwise the first cold-start window returns 502 Bad Gateway.
    depends_on:
      backend:
        condition: service_healthy
      shop:
        condition: service_started
      admin:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Swap to nginx.tls.conf once Cloudflare Origin Cert is dropped into ./nginx/certs/.
      # Default stays HTTP-only so the stack runs before you have a domain.
      - ./nginx/${NGINX_CONF_FILE:-nginx.conf}:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  pgdata:
  media:
