services:
  postgres:
    image: postgres:16-alpine
    container_name: halilov-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: halilov
      POSTGRES_USER: halilov
      POSTGRES_PASSWORD: halilov_dev
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halilov -d halilov"]
      interval: 5s
      timeout: 3s
      retries: 10
