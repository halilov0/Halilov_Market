worker_processes auto;
events { worker_connections 1024; }

# TLS variant — terminates HTTPS at the edge with a Cloudflare Origin Certificate.
# Activate by setting NGINX_CONF_FILE=nginx.tls.conf in infra/.env.
#
# Files expected (drop via scp into infra/nginx/certs/):
#   /etc/nginx/certs/origin.pem  Cloudflare Origin Certificate (PEM)
#   /etc/nginx/certs/origin.key  Cloudflare Origin Certificate private key
#
# Cloudflare DNS must point root + admin A records at the VM, proxy (orange cloud) ON.
# SSL/TLS mode in Cloudflare dashboard: "Full (strict)".

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    server_tokens off;

    # Cloudflare passes real IP in CF-Connecting-IP.
    # NOTE: open to all in dev; tighten to Cloudflare IP ranges in prod if direct access
    # to origin is possible (orange-cloud DNS already prevents direct hits in normal flow).
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    client_max_body_size 20m;

    # Per-IP rate limits — protects 1-OCPU backend from spikes/abuse.
    # CF-Connecting-IP is mapped to $remote_addr above, so zones key on real client IP.
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_status 429;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ----- :80 — redirect everything to HTTPS -----
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ----- admin.<domain> -----
    server {
        listen 443 ssl;
        http2  on;
        server_name ~^admin\..+$;

        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location /actuator/health {
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location / {
            limit_req zone=general burst=60 nodelay;
            set $u_admin admin:80;
            proxy_pass http://$u_admin$request_uri;
        }
    }

    # ----- root + www (shop) -----
    server {
        listen 443 ssl default_server;
        http2  on;
        server_name _;

        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location /actuator/health {
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location / {
            limit_req zone=general burst=60 nodelay;
            set $u_shop shop:80;
            proxy_pass http://$u_shop$request_uri;
        }
    }
}
