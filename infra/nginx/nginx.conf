worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    server_tokens off;

    # Cloudflare passes real IP in CF-Connecting-IP
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    # Docker embedded DNS — re-resolves upstream hostnames at runtime so a
    # recreated shop/admin/backend container is picked up without a restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    client_max_body_size 20m;

    # Per-IP rate limits — protects 1-OCPU backend from spikes/abuse.
    # CF-Connecting-IP is mapped to $remote_addr above, so zones key on real client IP.
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_status 429;

    # ----- admin.<domain> -----
    server {
        listen 80;
        server_name ~^admin\..+$;

        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location /actuator/health {
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location / {
            limit_req zone=general burst=60 nodelay;
            set $u_admin admin:80;
            proxy_pass http://$u_admin$request_uri;
        }
    }

    # ----- root + www (shop) -----
    server {
        listen 80 default_server;
        server_name _;

        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location /actuator/health {
            set $u_backend backend:8080;
            proxy_pass http://$u_backend$request_uri;
        }
        location / {
            limit_req zone=general burst=60 nodelay;
            set $u_shop shop:80;
            proxy_pass http://$u_shop$request_uri;
        }
    }
}
